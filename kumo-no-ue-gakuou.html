<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>くものうえ 学び王国</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: linear-gradient(180deg, #DCEEF7 0%, #FFF8EC 60%);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    font-family: 'Hiragino Maru Gothic ProN', 'Hiragino Sans', -apple-system, sans-serif;
  }
  #root { width: 100%; padding: 16px; }
  @media (min-width: 480px) {
    body { align-items: center; }
    #root { padding: 32px 16px; }
  }
  button { font-family: inherit; }

  .shell {
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    min-height: 640px;
    border-radius: 28px;
    position: relative;
    box-shadow: 0 10px 34px rgba(60,74,62,0.12);
    overflow: hidden;
  }
  .cloud-decor {
    position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 1;
  }
  .cloud-decor span { position: absolute; }
  .content { position: relative; z-index: 2; }

  .round-btn {
    border: none;
    border-radius: 999px;
    padding: 14px 30px;
    font-size: 14.5px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(60,74,62,0.15);
    letter-spacing: 0.3px;
  }

  .island-card {
    position: relative;
    background: #fff;
    border-radius: 20px;
    padding: 14px 16px;
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 3px 10px rgba(60,74,62,0.06);
    width: 100%;
    border: 2px solid #F0EEE7;
  }
  .island-icon {
    width: 54px; height: 54px; border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; flex-shrink: 0;
  }

  .choice-btn {
    border-radius: 14px;
    padding: 13px 14px;
    font-size: 14px;
    font-weight: 700;
    text-align: left;
    transition: background 0.2s, border-color 0.2s;
    cursor: pointer;
    width: 100%;
    border: 2px solid #F0EEE7;
    background: #FAF9F5;
    color: #3C4A3E;
  }

  .genki-bar-track {
    height: 10px; background: #EDEAE2; border-radius: 10px; overflow: hidden;
  }
  .genki-bar-fill {
    height: 100%; border-radius: 10px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }

  @keyframes wobbleAnim {
    0%,100% { transform: translateX(0) rotate(0); }
    25% { transform: translateX(-4px) rotate(-4deg); }
    75% { transform: translateX(4px) rotate(4deg); }
  }
  .wobble { animation: wobbleAnim 0.4s; }

  @keyframes sparkleFloat {
    0% { opacity: 0; transform: translateY(0) scale(0.5); }
    40% { opacity: 1; transform: translateY(-10px) scale(1.1); }
    100% { opacity: 0; transform: translateY(-24px) scale(0.9); }
  }
</style>
</head>
<body>
<div id="root"></div>

<script>
const QUESTIONS = {
  math: [
    { q: "-8 + 3 の答えは？", choices: ["-5", "5", "-11", "11"], a: 0 },
    { q: "3x = 21 のとき x は？", choices: ["6", "7", "8", "63"], a: 1 },
    { q: "(-4) × (-6) の答えは？", choices: ["-24", "24", "-10", "10"], a: 1 },
    { q: "1/3 + 1/6 を計算すると？", choices: ["1/2", "2/9", "1/9", "2/3"], a: 0 },
    { q: "正三角形の内角の和は？", choices: ["90°", "180°", "270°", "360°"], a: 1 },
    { q: "y = 2x のグラフの傾きは？", choices: ["1", "2", "-2", "0"], a: 1 },
    { q: "7² の値は？", choices: ["14", "49", "77", "21"], a: 1 },
    { q: "-15 ÷ 3 の答えは？", choices: ["-5", "5", "-45", "45"], a: 0 },
    { q: "2x - 5 = 9 のとき x は？", choices: ["2", "5", "7", "14"], a: 2 },
    { q: "対頂角の性質として正しいのは？", choices: ["常に等しい", "常に90°", "和が180°", "和が360°"], a: 0 },
    { q: "0.4 を分数で表すと？", choices: ["1/4", "2/5", "4/10のまま", "1/40"], a: 1 },
    { q: "円周率の近似値は？", choices: ["3.10", "3.14", "3.41", "4.13"], a: 1 },
  ],
  english: [
    { q: "「彼女は毎日勉強します」を選べ", choices: ["She study every day.", "She studies every day.", "She studying every day.", "She studyed every day."], a: 1 },
    { q: "「犬」の複数形は？", choices: ["dogs", "doges", "dogies", "dogs's"], a: 0 },
    { q: "\"I ___ a student.\" に入る語は？", choices: ["am", "is", "are", "be"], a: 0 },
    { q: "\"What time is it?\" の意味は？", choices: ["元気ですか", "何時ですか", "どこですか", "誰ですか"], a: 1 },
    { q: "「これは私の本です」を選べ", choices: ["This is my book.", "This am my book.", "This are my book.", "This is I book."], a: 0 },
    { q: "\"can\" の意味として正しいのは？", choices: ["〜すべき", "〜できる", "〜したい", "〜している"], a: 1 },
    { q: "疑問文の作り方は？ \"You like cats.\" →", choices: ["You like cats?", "Do you like cats?", "Are you like cats?", "Like you cats?"], a: 1 },
    { q: "「大きい」を表す語は？", choices: ["small", "big", "long", "short"], a: 1 },
    { q: "\"There ___ two cats.\" に入る語は？", choices: ["is", "are", "am", "be"], a: 1 },
    { q: "「〜しないでください」を表すのは？", choices: ["Please not.", "Don't ~", "Not ~", "No ~ please"], a: 1 },
    { q: "\"library\" の意味は？", choices: ["図書館", "病院", "学校", "公園"], a: 0 },
    { q: "3人称単数の動詞変化：\"go\" →", choices: ["goes", "gos", "going", "goed"], a: 0 },
  ],
  japanese: [
    { q: "「明鏡止水」の意味に近いのは？", choices: ["心が静かで澄んでいる", "とても怒っている", "忙しく動き回る", "自信満々である"], a: 0 },
    { q: "「走る」の活用の種類は？", choices: ["五段活用", "上一段活用", "下一段活用", "カ行変格活用"], a: 0 },
    { q: "「けれども」の品詞は？", choices: ["接続詞", "副詞", "助詞", "感動詞"], a: 0 },
    { q: "漢字「垂直」の読みは？", choices: ["すいちょく", "たれちょく", "すいじき", "たれじき"], a: 0 },
    { q: "「枕草子」の作者は？", choices: ["紫式部", "清少納言", "兼好法師", "松尾芭蕉"], a: 1 },
    { q: "「主語」とは何を表す言葉？", choices: ["動作や状態の主体", "動作の対象", "場所や時間", "様子を詳しくする語"], a: 0 },
    { q: "「たとえ雨が降っても行く」の「たとえ」の働きは？", choices: ["仮定を強調する", "原因を示す", "結果を示す", "並列を示す"], a: 0 },
    { q: "「一期一会」の意味は？", choices: ["一生に一度の出会いを大切にすること", "毎日同じことをすること", "一年に一度会うこと", "初対面の挨拶"], a: 0 },
    { q: "「静かだ」の品詞は？", choices: ["形容動詞", "形容詞", "動詞", "副詞"], a: 0 },
    { q: "俳句の音数は？", choices: ["5・7・5", "5・7・7", "7・7・7", "5・5・7"], a: 0 },
    { q: "「にわか雨」の意味は？", choices: ["急に降り出す雨", "長く降り続く雨", "夜だけ降る雨", "雪まじりの雨"], a: 0 },
    { q: "「花」を使った比喩で「花形」の意味は？", choices: ["人気者・中心的存在", "花を作る職人", "花の形をしたもの", "花見をすること"], a: 0 },
  ],
  social: [
    { q: "日本の首都は？", choices: ["大阪", "東京", "京都", "名古屋"], a: 1 },
    { q: "三権分立の「三権」に含まれないのは？", choices: ["立法権", "行政権", "司法権", "選挙権"], a: 3 },
    { q: "縄文時代の代表的な土器は？", choices: ["弥生土器", "縄文土器", "須恵器", "埴輪"], a: 1 },
    { q: "日本国憲法の三大原則でないものは？", choices: ["国民主権", "基本的人権の尊重", "平和主義", "天皇主権"], a: 3 },
    { q: "世界最大の大陸は？", choices: ["アフリカ大陸", "ユーラシア大陸", "北アメリカ大陸", "南極大陸"], a: 1 },
    { q: "聖徳太子が制定したのは？", choices: ["十七条の憲法", "大宝律令", "武家諸法度", "御成敗式目"], a: 0 },
    { q: "季節風（モンスーン）の説明として正しいのは？", choices: ["季節によって向きが変わる風", "一年中同じ方向に吹く風", "海だけに吹く風", "台風のこと"], a: 0 },
    { q: "鎌倉幕府を開いたのは？", choices: ["源頼朝", "足利尊氏", "徳川家康", "織田信長"], a: 0 },
    { q: "経度0度の基準線が通る都市は？", choices: ["パリ", "ロンドン", "ニューヨーク", "東京"], a: 1 },
    { q: "大化の改新が始まった年は？", choices: ["645年", "710年", "794年", "1192年"], a: 0 },
    { q: "地方自治で住民が首長を選ぶ制度は？", choices: ["間接選挙", "直接選挙", "指名制", "抽選制"], a: 1 },
    { q: "三大穀物に含まれないのは？", choices: ["米", "小麦", "とうもろこし", "大豆"], a: 3 },
  ],
  science: [
    { q: "水の化学式は？", choices: ["H2O", "CO2", "O2", "NaCl"], a: 0 },
    { q: "光合成を行う植物の部分は？", choices: ["根", "葉", "花", "茎の中心"], a: 1 },
    { q: "音は何を伝わって届く？", choices: ["振動（波）", "光", "磁力", "熱のみ"], a: 0 },
    { q: "地震の規模を表す単位は？", choices: ["震度", "マグニチュード", "デシベル", "ヘルツ"], a: 1 },
    { q: "気体が液体になる変化を何という？", choices: ["蒸発", "凝縮（液化）", "昇華", "凝固"], a: 1 },
    { q: "植物の細胞に細胞壁があるが、動物細胞には？", choices: ["ある", "ない", "時々ある", "核にだけある"], a: 1 },
    { q: "電流の単位は？", choices: ["ボルト", "アンペア", "オーム", "ワット"], a: 1 },
    { q: "酸性・アルカリ性を調べるのに使う紙は？", choices: ["ろ紙", "リトマス紙", "画用紙", "感光紙"], a: 1 },
    { q: "地層が下から上にできる順番の考え方を何という？", choices: ["整合の法則", "地層累重の法則", "堆積の逆転", "侵食の法則"], a: 1 },
    { q: "力の大きさの単位は？", choices: ["ニュートン", "パスカル", "ジュール", "ワット"], a: 0 },
    { q: "食塩水は何と何の混合物？", choices: ["水と食塩", "水と砂糖", "水と炭素", "水と鉄"], a: 0 },
    { q: "月が地球の周りを回ることを何という？", choices: ["自転", "公転", "他の呼び方はない", "回転運動のみ"], a: 1 },
  ],
};

const ISLANDS = [
  { id: "math", name: "数字の草原島", short: "数学", emoji: "🌾", accent: "#7FB685", accentDark: "#5C9463", bg: "#F1F8EE", spirit: "ナンバっち", sEmoji: "🐰" },
  { id: "english", name: "ことばの灯台島", short: "英語", emoji: "🏝️", accent: "#8FC1D4", accentDark: "#5E9BB0", bg: "#EEF6F8", spirit: "ワードゥル", sEmoji: "🦉" },
  { id: "japanese", name: "詩のしずく島", short: "国語", emoji: "🌸", accent: "#E8A0A0", accentDark: "#C97878", bg: "#FBEFEF", spirit: "コトダマン", sEmoji: "💧" },
  { id: "social", name: "歴史の遺跡島", short: "社会", emoji: "🗿", accent: "#C99A6A", accentDark: "#A87B4E", bg: "#F8F0E4", spirit: "レキシード", sEmoji: "🐢" },
  { id: "science", name: "ふしぎな実験島", short: "理科", emoji: "🧪", accent: "#B39BD8", accentDark: "#9179B8", bg: "#F3EFF9", spirit: "ジッケンヌ", sEmoji: "🐌" },
];

const MAX_GENKI = { player: 100, spirit: 80 };
const CHEER_LINES = ["やったね！", "さすが！", "その調子〜！", "ぴかぴか光った！", "すごいすごい！"];
const MISS_LINES = ["おしい！", "もういちど いっしょに考えよう", "だいじょうぶ、次いこう", "ちょっとひとやすみ"];

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

const state = {
  screen: "title",
  friends: [],
  level: 1,
  exp: 0,
  playerGenki: MAX_GENKI.player,
  spiritGenki: MAX_GENKI.spirit,
  island: null,
  queue: [],
  qIndex: 0,
  choiceState: null,
  selected: null,
  log: "",
  combo: 0,
};

function expToNext() { return state.level * 30; }

function startIsland(islandId) {
  const isl = ISLANDS.filter(function (s) { return s.id === islandId; })[0];
  state.island = isl;
  state.queue = shuffle(QUESTIONS[islandId]).slice(0, 6);
  state.qIndex = 0;
  state.playerGenki = MAX_GENKI.player;
  state.spiritGenki = MAX_GENKI.spirit;
  state.combo = 0;
  state.log = isl.spirit + " が すがたを あらわした！";
  state.choiceState = null;
  state.selected = null;
  state.screen = "battle";
  render();
}

function currentQ() { return state.queue[state.qIndex]; }

function answer(idx) {
  if (state.choiceState) return;
  state.selected = idx;
  const q = currentQ();
  const correct = idx === q.a;
  if (correct) {
    const dmg = 14 + Math.floor(state.level * 1.5) + state.combo * 2;
    state.choiceState = "correct";
    state.combo += 1;
    state.spiritGenki = Math.max(0, state.spiritGenki - dmg);
    state.log = CHEER_LINES[Math.floor(Math.random() * CHEER_LINES.length)] + " " + state.island.spirit + "が びっくり！";
    render();
    triggerSparkle();
  } else {
    const dmg = 8 + Math.floor(Math.random() * 6);
    state.choiceState = "wrong";
    state.combo = 0;
    state.playerGenki = Math.max(0, state.playerGenki - dmg);
    state.log = MISS_LINES[Math.floor(Math.random() * MISS_LINES.length)] + " 正かいは「" + q.choices[q.a] + "」";
    render();
    triggerWobble();
  }

  setTimeout(function () {
    if (state.spiritGenki <= 0) {
      const gained = 20 + state.level * 4;
      let newExp = state.exp + gained;
      let newLevel = state.level;
      let leveled = false;
      while (newExp >= newLevel * 30) {
        newExp -= newLevel * 30;
        newLevel += 1;
        leveled = true;
      }
      state.exp = newExp;
      state.level = newLevel;
      if (state.friends.indexOf(state.island.id) === -1) state.friends.push(state.island.id);
      state.screen = "clear";
      render();
      if (leveled) showLevelUpOverlay();
      return;
    }
    if (state.playerGenki <= 0) {
      state.screen = "rest";
      render();
      return;
    }
    if (state.qIndex + 1 >= state.queue.length) {
      state.queue = state.queue.concat(shuffle(QUESTIONS[state.island.id]));
    }
    state.qIndex += 1;
    state.choiceState = null;
    state.selected = null;
    render();
  }, 1200);
}

function triggerWobble() {
  const el = document.querySelector(".spirit-figure");
  if (el) {
    el.classList.remove("wobble");
    void el.offsetWidth;
    el.classList.add("wobble");
  }
}

function triggerSparkle() {
  const layer = document.querySelector(".sparkle-layer");
  if (!layer) return;
  layer.innerHTML = "";
  const positions = ["10%", "30%", "60%", "80%", "45%"];
  positions.forEach(function (left, i) {
    const s = document.createElement("div");
    s.textContent = "✨";
    s.style.position = "absolute";
    s.style.left = left;
    s.style.top = (20 + (i % 3) * 20) + "%";
    s.style.fontSize = "16px";
    s.style.animation = "sparkleFloat 0.6s ease-out " + (i * 0.05) + "s";
    s.style.opacity = "0";
    layer.appendChild(s);
  });
  setTimeout(function () { layer.innerHTML = ""; }, 700);
}

function showLevelUpOverlay() {
  const shell = document.querySelector(".shell");
  if (!shell) return;
  const overlay = document.createElement("div");
  overlay.style.cssText = "position:absolute;inset:0;background:rgba(60,74,62,0.45);display:flex;align-items:center;justify-content:center;border-radius:28px;z-index:10;";
  overlay.innerHTML = '<div style="background:#fff;border-radius:22px;padding:26px 32px;text-align:center;">' +
    '<div style="font-size:40px;">🌟</div>' +
    '<div style="font-weight:900;font-size:17px;color:#3C4A3E;">レベルアップ！</div>' +
    '<div style="font-size:12.5px;color:#9AA69B;">Lv.' + state.level + ' になった</div>' +
    '</div>';
  shell.appendChild(overlay);
  setTimeout(function () { overlay.remove(); }, 1800);
}

function resetGame() {
  state.screen = "title";
  state.friends = [];
  state.level = 1;
  state.exp = 0;
  render();
}

function goMap() {
  state.screen = "map";
  render();
}

function cloudDecorHTML(faint) {
  const op = faint ? 0.5 : 1;
  return '<div class="cloud-decor">' +
    '<span style="top:20px;left:-10px;font-size:34px;opacity:' + op + ';">☁️</span>' +
    '<span style="top:70px;right:-6px;font-size:26px;opacity:' + (op * 0.8) + ';">☁️</span>' +
    '<span style="bottom:30px;left:10px;font-size:22px;opacity:' + (op * 0.6) + ';">☁️</span>' +
    '<span style="top:130px;left:45%;font-size:18px;opacity:' + (op * 0.5) + ';">✨</span>' +
    '</div>';
}

function genkiBarHTML(value, max, color) {
  const pct = Math.max(0, (value / max) * 100);
  return '<div style="width:100%;max-width:120px;">' +
    '<div class="genki-bar-track"><div class="genki-bar-fill" style="width:' + pct + '%;background:' + color + ';"></div></div>' +
    '</div>';
}

function renderTitle() {
  const root = document.getElementById("root");
  root.innerHTML =
    '<div class="shell" style="background:linear-gradient(180deg, #DCEEF7 0%, #FFF8EC 65%);">' +
      cloudDecorHTML(false) +
      '<div class="content" style="text-align:center;padding:56px 24px 40px;">' +
        '<div style="font-size:58px;margin-bottom:6px;">☁️🏰☁️</div>' +
        '<h1 style="font-family:\'Hiragino Maru Gothic ProN\',sans-serif;font-size:26px;color:#3C4A3E;margin:4px 0 8px;font-weight:900;letter-spacing:1px;">くものうえ 学び王国</h1>' +
        '<p style="color:#6b7d6e;font-size:13.5px;margin:0 0 30px;line-height:1.7;">5つの島をめぐって、教科の精霊たちと<br/>なかよくなろう！</p>' +
        '<div style="display:flex;justify-content:center;gap:14px;margin-bottom:34px;">' +
          ISLANDS.map(function (s) { return '<div style="font-size:26px;">' + s.sEmoji + '</div>'; }).join("") +
        '</div>' +
        '<button class="round-btn" style="background:#F4C15C;color:#3C4A3E;" onclick="goMap()">🌤️ ぼうけんを はじめる</button>' +
      '</div>' +
    '</div>';
}

function renderMap() {
  const root = document.getElementById("root");
  const allDone = state.friends.length === ISLANDS.length;
  root.innerHTML =
    '<div class="shell" style="background:linear-gradient(180deg, #DCEEF7 0%, #FFF8EC 70%);">' +
      cloudDecorHTML(true) +
      '<div class="content" style="padding:20px 16px 28px;">' +
        '<div style="background:#fff;border-radius:18px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 3px 10px rgba(60,74,62,0.06);">' +
          '<div style="display:flex;align-items:center;gap:10px;">' +
            '<div style="font-size:24px;">🧑‍🌾</div>' +
            '<div>' +
              '<div style="font-size:12.5px;font-weight:800;color:#3C4A3E;">勇者 Lv.' + state.level + '</div>' +
              '<div style="font-size:10.5px;color:#9AA69B;">EXP ' + state.exp + '/' + expToNext() + ' ・ なかま ' + state.friends.length + '/5</div>' +
            '</div>' +
          '</div>' +
          '<div style="width:84px;"><div style="height:8px;background:#EDEAE2;border-radius:8px;overflow:hidden;"><div style="height:100%;width:' + ((state.exp / expToNext()) * 100) + '%;background:#F4C15C;border-radius:8px;transition:width 0.5s;"></div></div></div>' +
        '</div>' +
        '<h2 style="text-align:center;font-size:17px;color:#3C4A3E;margin:20px 0 16px;font-weight:800;">島を えらんでね</h2>' +
        '<div style="display:flex;flex-direction:column;gap:12px;">' +
          ISLANDS.map(function (s) {
            const done = state.friends.indexOf(s.id) !== -1;
            return '<button class="island-card" style="border-color:' + (done ? s.accent : "#F0EEE7") + ';" onclick="startIsland(\'' + s.id + '\')">' +
              '<div class="island-icon" style="background:' + s.bg + ';">' + s.emoji + '</div>' +
              '<div style="flex:1;min-width:0;">' +
                '<div style="font-size:14.5px;font-weight:800;color:#3C4A3E;">' + s.name + '</div>' +
                '<div style="font-size:12px;color:#9AA69B;margin-top:1px;">' + s.sEmoji + ' ' + s.spirit + '・' + s.short + '</div>' +
              '</div>' +
              (done ? '<div style="font-size:20px;">💛</div>' : '<div style="font-size:18px;color:#C9CFC5;">→</div>') +
            '</button>';
          }).join("") +
        '</div>' +
        (allDone ? '<div style="margin-top:22px;text-align:center;"><button class="round-btn" style="background:#F4C15C;color:#3C4A3E;" onclick="state.screen=\'allclear\';render();">🏆 王国のひろばへ</button></div>' : "") +
      '</div>' +
    '</div>';
}

function renderBattle() {
  const root = document.getElementById("root");
  const island = state.island;
  const q = currentQ();
  if (!q) return;

  const choicesHTML = q.choices.map(function (c, i) {
    let bg = "#FAF9F5", border = "#F0EEE7", color = "#3C4A3E";
    if (state.choiceState) {
      if (i === q.a) { bg = "#EAF4EA"; border = "#7FB685"; }
      else if (i === state.selected) { bg = "#FAECEA"; border = "#E0A79A"; }
    }
    const disabled = state.choiceState ? "disabled" : "";
    return '<button class="choice-btn" style="background:' + bg + ';border-color:' + border + ';color:' + color + ';" ' + disabled + ' onclick="answer(' + i + ')">' + c + '</button>';
  }).join("");

  root.innerHTML =
    '<div class="shell" style="background:linear-gradient(180deg, ' + island.bg + ' 0%, #FFFDF9 60%);">' +
      cloudDecorHTML(true) +
      '<div class="content" style="padding:16px 16px 22px;">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">' +
          '<span style="font-size:12.5px;font-weight:800;color:' + island.accentDark + ';">' + island.emoji + ' ' + island.name + '</span>' +
          '<span style="font-size:11.5px;font-weight:700;color:#9AA69B;background:#fff;padding:3px 10px;border-radius:20px;">Lv.' + state.level + '</span>' +
        '</div>' +
        '<div style="background:#fff;border-radius:22px;padding:20px 16px 16px;box-shadow:0 4px 14px rgba(60,74,62,0.08);position:relative;overflow:hidden;">' +
          '<div class="sparkle-layer" style="position:absolute;inset:0;pointer-events:none;z-index:3;"></div>' +
          '<div style="display:flex;justify-content:space-around;align-items:flex-end;margin-bottom:14px;gap:10px;">' +
            '<div style="text-align:center;">' +
              '<div style="font-size:42px;">🧑‍🌾</div>' +
              '<div style="font-size:11px;font-weight:700;color:#6b7d6e;margin:2px 0 5px;">勇者</div>' +
              genkiBarHTML(state.playerGenki, MAX_GENKI.player, "#7FB685") +
              '<div style="font-size:10px;color:#9AA69B;margin-top:2px;">げんき ' + Math.max(0, state.playerGenki) + '</div>' +
            '</div>' +
            '<div style="font-size:18px;color:#DCD6C8;">💫</div>' +
            '<div class="spirit-figure" style="text-align:center;">' +
              '<div style="font-size:42px;">' + island.sEmoji + '</div>' +
              '<div style="font-size:11px;font-weight:700;color:#6b7d6e;margin:2px 0 5px;">' + island.spirit + '</div>' +
              genkiBarHTML(state.spiritGenki, MAX_GENKI.spirit, island.accent) +
              '<div style="font-size:10px;color:#9AA69B;margin-top:2px;">げんき ' + Math.max(0, state.spiritGenki) + '</div>' +
            '</div>' +
          '</div>' +
          '<div style="background:' + island.bg + ';color:#3C4A3E;border-radius:14px;padding:9px 14px;font-size:12.5px;min-height:36px;display:flex;align-items:center;font-weight:700;">' + state.log + '</div>' +
        '</div>' +
        '<div style="margin-top:14px;background:#fff;border-radius:20px;padding:16px 16px 14px;box-shadow:0 4px 14px rgba(60,74,62,0.08);">' +
          (state.combo > 1 ? '<div style="font-size:11.5px;font-weight:800;color:#F4C15C;margin-bottom:6px;">✨ ' + state.combo + 'れん続 正かい中！</div>' : "") +
          '<div style="font-size:15px;font-weight:800;color:#3C4A3E;margin-bottom:14px;line-height:1.55;">' + q.q + '</div>' +
          '<div style="display:flex;flex-direction:column;gap:8px;">' + choicesHTML + '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
}

function renderClear() {
  const root = document.getElementById("root");
  const island = state.island;
  root.innerHTML =
    '<div class="shell" style="background:linear-gradient(180deg, ' + island.bg + ' 0%, #FFFDF9 60%);">' +
      cloudDecorHTML(true) +
      '<div class="content" style="text-align:center;padding:54px 24px;">' +
        '<div style="font-size:54px;">' + island.sEmoji + '💛</div>' +
        '<h2 style="color:#3C4A3E;font-size:19px;margin:10px 0 4px;font-weight:900;">' + island.spirit + ' と なかよくなった！</h2>' +
        '<p style="color:#9AA69B;font-size:12.5px;margin-bottom:24px;">' + island.name + '・クリア</p>' +
        '<div style="background:#fff;border-radius:18px;padding:14px 22px;display:inline-block;margin-bottom:28px;box-shadow:0 4px 14px rgba(60,74,62,0.06);">' +
          '<div style="font-size:12.5px;color:#6b7d6e;font-weight:700;">Lv.' + state.level + ' ・ EXP ' + state.exp + '/' + expToNext() + '</div>' +
        '</div>' +
        '<div><button class="round-btn" style="background:' + island.accent + ';color:#fff;" onclick="goMap()">☁️ 島マップへ もどる</button></div>' +
      '</div>' +
    '</div>';
}

function renderRest() {
  const root = document.getElementById("root");
  root.innerHTML =
    '<div class="shell" style="background:linear-gradient(180deg, #EFEAF6 0%, #FFF8EC 70%);">' +
      cloudDecorHTML(true) +
      '<div class="content" style="text-align:center;padding:54px 24px;">' +
        '<div style="font-size:54px;">💤🛏️</div>' +
        '<h2 style="color:#3C4A3E;font-size:19px;margin:10px 0 4px;font-weight:900;">ちょっと ひとやすみ</h2>' +
        '<p style="color:#9AA69B;font-size:12.5px;margin-bottom:24px;line-height:1.7;">げんきが なくなっちゃった…<br/>また ちょうせんしてみよう！</p>' +
        '<button class="round-btn" style="background:#F4C15C;color:#3C4A3E;" onclick="goMap()">☁️ 島マップへ もどる</button>' +
      '</div>' +
    '</div>';
}

function renderAllClear() {
  const root = document.getElementById("root");
  root.innerHTML =
    '<div class="shell" style="background:linear-gradient(180deg, #FFF3D6 0%, #FFF8EC 65%);">' +
      cloudDecorHTML(false) +
      '<div class="content" style="text-align:center;padding:54px 24px;">' +
        '<div style="font-size:60px;">🏆</div>' +
        '<h2 style="color:#3C4A3E;font-size:21px;margin:10px 0 4px;font-weight:900;">王国の なかまが そろった！</h2>' +
        '<p style="color:#6b7d6e;font-size:13px;margin-bottom:22px;line-height:1.7;">5つの島の精霊 みんなと なかよくなった！<br/>Lv.' + state.level + ' の勇者になったよ。</p>' +
        '<div style="font-size:28px;margin-bottom:26px;">' + ISLANDS.map(function (s) { return '<span style="margin:0 5px;">' + s.sEmoji + '</span>'; }).join("") + '</div>' +
        '<button class="round-btn" style="background:#F4C15C;color:#3C4A3E;" onclick="resetGame()">🔁 さいしょから あそぶ</button>' +
      '</div>' +
    '</div>';
}

function render() {
  if (state.screen === "title") renderTitle();
  else if (state.screen === "map") renderMap();
  else if (state.screen === "battle") renderBattle();
  else if (state.screen === "clear") renderClear();
  else if (state.screen === "rest") renderRest();
  else if (state.screen === "allclear") renderAllClear();
}

render();
</script>
</body>
</html>
