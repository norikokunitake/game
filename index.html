function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function randNonZero(min, max) { let v = 0; while (v === 0) v = randInt(min, max); return v; }

function generateProblem(unit, difficulty) {
  // 問題生成ロジックは変更なし
  const range = Math.min(6 + difficulty * 3, 40);
  if (unit === "正負の数") {
    const a = randNonZero(-range, range);
    const b = randNonZero(-range, range);
    const op = Math.random() < 0.5 ? "+" : "-";
    const answer = op === "+" ? a + b : a - b;
    const bStr = b < 0 ? `(${b})` : `${b}`;
    return { text: `(${a}) ${op} ${bStr} を計算せよ。`, answer: String(answer),
      hint: `数直線上で${a}からスタートして考えよう。` };
  }
  if (unit === "文字式") {
    const a = randNonZero(-9, 9);
    const b = randNonZero(-9, 9);
    const x = randInt(-9, 9);
    const answer = a * x + b;
    return { text: `x = ${x} のとき、${a}x ${b >= 0 ? "+ " + b : "- " + Math.abs(b)} の値は？`, answer: String(answer),
      hint: `xに${x}を代入して掛け算から先に計算しよう。` };
  }
  if (unit === "方程式") {
    const a = randNonZero(2, 4 + Math.floor(difficulty / 2));
    const x = randInt(-9, 9);
    const b = randInt(-15, 15);
    const c = a * x + b;
    return { text: `${a}x ${b >= 0 ? "+ " + b : "- " + Math.abs(b)} = ${c} のとき、xは？`, answer: String(x),
      hint: `まずは定数項を右辺に移項しよう。` };
  }
  if (unit === "比例・反比例") {
    const k = randNonZero(-8, 8);
    const x = randNonZero(-9, 9);
    const y = k * x;
    const askY = Math.random() < 0.5;
    if (askY) return { text: `yはxに比例(定数${k})。x=${x}のときyは？`, answer: String(y),
      hint: `y = ${k} × x に代入しよう。` };
    return { text: `yはxに比例。x=${x}のときy=${y}。比例定数は？`, answer: String(k),
      hint: `比例定数は y ÷ x だよ。` };
  }
  if (unit === "図形") {
    const shape = Math.random() < 0.5 ? "rect" : "triangle";
    const w = randInt(3, 8 + difficulty);
    const h = randInt(3, 8 + difficulty);
    if (shape === "rect") return { text: `縦${h}cm、横${w}cm の長方形の面積は？`, answer: String(w * h),
      hint: `長方形は「縦 × 横」だよ。` };
    const area = (w * h) / 2;
    return { text: `底辺${w}cm、高さ${h}cm の三角形の面積は？`, answer: Number.isInteger(area) ? String(area) : area.toFixed(1),
      hint: `三角形は「底辺 × 高さ ÷ 2」だよ。` };
  }
  return { text: "1 + 1 は？", answer: "2", hint: "そのまま計算しよう。" };
}

function Bar({ value, max, color }) {
  const pct = Math.max(0, Math.min(100, (value / max) * 100));
  return (
    <div className="w-full h-3 bg-black/10 rounded-full overflow-hidden shadow-inner">
      <div className="h-full rounded-full transition-all duration-300 ease-out" style={{ width: `${pct}%`, background: color }} />
    </div>
  );
}

/* =========================================================
   Game Logic
   ========================================================= */
function MathMonsterGame() {
  const [screen, setScreen] = useState("map");
  const [player, setPlayer] = useState({ level: 3, exp: 20, expToNext: 60, gold: 40 });
  const [partnerId] = useState("fireSlime");
  const [partnerStats, setPartnerStats] = useState({ level: 3, exp: 10 });
  const [ownedSet, setOwnedSet] = useState(new Set(["fireSlime"]));
  const [currentArea, setCurrentArea] = useState(null);
  const [difficulty, setDifficulty] = useState(3);
  const [combo, setCombo] = useState(0);
  const [streak, setStreak] = useState({ correct: 0, wrong: 0 });
  const [battle, setBattle] = useState(null);
  const [problem, setProblem] = useState(null);
  const [input, setInput] = useState("");
  const [showHint, setShowHint] = useState(false);
  const [feedback, setFeedback] = useState(null);
  const [resultInfo, setResultInfo] = useState(null);
  const [isProcessing, setIsProcessing] = useState(false);

  const partner = SPECIES[partnerId];

  const startBattle = useCallback((area, isBoss = false) => {
    const enemyId = isBoss ? area.bossSpecies : area.enemySpecies[randInt(0, area.enemySpecies.length - 1)];
    const enemy = SPECIES[enemyId];
    const maxHp = isBoss ? 260 : 90;
    setCurrentArea(area);
    setBattle({ enemyId, enemy, isBoss, hp: maxHp, maxHp, questionsAnswered: 0, questionsTarget: isBoss ? 10 : 4 });
    setCombo(0);
    setStreak({ correct: 0, wrong: 0 });
    setProblem(generateProblem(area.unit, difficulty));
    setInput("");
    setShowHint(false);
    setFeedback(null);
    setScreen("battle");
  }, [difficulty]);

  const nextQuestion = useCallback((area, newDifficulty) => {
    setProblem(generateProblem(area.unit, newDifficulty));
    setInput("");
    setShowHint(false);
    setIsProcessing(false);
  }, []);

  const handleInput = (val) => {
    if (isProcessing) return;
    if (input.length > 8) return; // 桁数制限
    if (val === "-" && input !== "") return; // マイナスは先頭のみ
    if (val === "." && input.includes(".")) return; // 小数点は1つまで
    setInput(prev => prev + val);
  };

  const handleDelete = () => {
    if (isProcessing) return;
    setInput(prev => prev.slice(0, -1));
  };

  const submitAnswer = () => {
    if (!problem || !battle || isProcessing || input.trim() === "") return;
    setIsProcessing(true);
    
    const isCorrect = input.trim() === problem.answer;

    if (isCorrect) {
      const newStreak = { correct: streak.correct + 1, wrong: 0 };
      setStreak(newStreak);
      let newDifficulty = difficulty;
      if (newStreak.correct >= 3) { newDifficulty = Math.min(10, difficulty + 1); newStreak.correct = 0; }
      setDifficulty(newDifficulty);

      const newCombo = combo + 1;
      setCombo(newCombo);
      const crit = !showHint;
      const base = battle.isBoss ? 22 : 30;
      const comboBonus = 1 + Math.min(newCombo * 0.1, 1.0);
      const critBonus = crit ? 1.5 : 1.0;
      const dmg = Math.round(base * comboBonus * critBonus);
      const newHp = Math.max(0, battle.hp - dmg);
      const newAnswered = battle.questionsAnswered + 1;

      setFeedback({ type: "correct", message: crit ? `会心の一撃！ ${dmg}ダメージ！` : `正解！ ${dmg}ダメージ！` });

      // テンポアップ: 900ms -> 600ms に短縮
      setTimeout(() => {
        setFeedback(null);
        if (newHp <= 0 || newAnswered >= battle.questionsTarget) {
          finishBattle(true, newAnswered);
          setIsProcessing(false);
        } else {
          setBattle((b) => ({ ...b, hp: newHp, questionsAnswered: newAnswered }));
          nextQuestion(currentArea, newDifficulty);
        }
      }, 600); 
    } else {
      const newStreak = { correct: 0, wrong: streak.wrong + 1 };
      setStreak(newStreak);
      setCombo(0);
      let newDifficulty = difficulty;
      if (newStreak.wrong >= 2) { newDifficulty = Math.max(1, difficulty - 1); newStreak.wrong = 0; }
      setDifficulty(newDifficulty);
      setFeedback({ type: "wrong", message: "おしい！ もう一度考えてみよう" });
      setShowHint(true);
      
      // 不正解時は入力をクリアしてすぐ再挑戦可能に
      setTimeout(() => {
        setFeedback(null);
        setInput("");
        setIsProcessing(false);
      }, 800);
    }
  };

  const finishBattle = (won, questionsAnswered) => {
    const expGain = battle.isBoss ? 50 : 15;
    const goldGain = battle.isBoss ? 30 : 10;
    setResultInfo({
      won, isBoss: battle.isBoss, expGain, goldGain,
      caught: !battle.isBoss && Math.random() < 0.4 ? battle.enemyId : null,
      areaCleared: battle.isBoss,
    });

    setPlayer((p) => {
      let exp = p.exp + expGain, level = p.level, expToNext = p.expToNext;
      while (exp >= expToNext) { exp -= expToNext; level += 1; expToNext = Math.round(expToNext * 1.25); }
      return { ...p, exp, level, expToNext, gold: p.gold + goldGain };
    });

    setPartnerStats((s) => {
      let exp = s.exp + expGain, level = s.level, threshold = 20 + level * 5;
      while (exp >= threshold) { exp -= threshold; level += 1; threshold = 20 + level * 5; }
      return { level, exp };
    });

    if (!battle.isBoss && Math.random() < 0.4) setOwnedSet((s) => new Set([...s, battle.enemyId]));

    setScreen("result");
  };

  const areaUnlocked = (area) => player.level >= area.reqLevel;

  function MapScreen() {
    return (
      <div className="min-h-screen bg-[#F8FAFC] pb-24">
        <TopBar player={player} />
        <div className="px-5 pt-6 pb-2">
          <h1 className="text-2xl font-extrabold text-[#1E293B]">エリア選択</h1>
          <p className="text-sm text-[#64748B] mt-1">好きなステージを選んでバトル開始！</p>
        </div>

        <div className="px-4 flex flex-col gap-4">
          {AREAS.map((area) => {
            const unlocked = areaUnlocked(area);
            return (
              <div key={area.id} 
                className={`relative rounded-3xl p-5 text-left transition-all ${unlocked ? "shadow-lg bg-white" : "opacity-50 bg-gray-100 grayscale"}`}
                style={unlocked ? { borderLeft: `6px solid ${area.color}` } : {}}>
                <div className="flex justify-between items-center">
                  <div className="flex-1">
                    <div className="text-xs font-bold text-[#64748B] mb-1">{area.unit}</div>
                    <div className="text-xl font-extrabold text-[#1E293B] leading-tight">{area.name}</div>
                  </div>
                  <div className="w-16 h-16 flex items-center justify-center">
                    {SPECIES[area.enemySpecies[0]].Art({ size: 64 })}
                  </div>
                </div>
                
                <div className="mt-4 flex gap-2">
                  <button disabled={!unlocked} onClick={() => startBattle(area, false)}
                    className="flex-1 py-2.5 rounded-xl bg-[#F1F5F9] text-[#334155] font-bold text-sm active:scale-95 transition-transform">
                    {unlocked ? "探索する" : `Lv.${area.reqLevel}で解放`}
                  </button>
                  {unlocked && (
                    <button onClick={(e) => { e.stopPropagation(); startBattle(area, true); }}
                      className="flex-1 py-2.5 rounded-xl text-white font-bold text-sm active:scale-95 transition-transform shadow-md"
                      style={{ backgroundColor: area.color }}>
                      ボスに挑戦
                    </button>
                  )}
                </div>
              </div>
            );
          })}
        </div>

        <div className="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-white to-transparent pointer-events-none">
          <button onClick={() => setScreen("collection")}
            className="w-full max-w-md mx-auto pointer-events-auto flex items-center justify-center gap-2 py-4 rounded-2xl bg-[#1E293B] text-white font-bold shadow-xl active:scale-95 transition-transform">
            📖 モンスター図鑑
          </button>
        </div>
      </div>
    );
  }

  function BattleScreen() {
    if (!battle || !problem || !currentArea) return null;
    
    const isError = feedback?.type === "wrong";
    
    return (
      <div className="h-[100dvh] flex flex-col overflow-hidden" style={{ background: `linear-gradient(180deg, ${currentArea.color}22, #F8FAFC 40%)` }}>
        <TopBar player={player} />
        
        {/* バトルエリア */}
        <div className="flex-1 flex flex-col justify-center items-center px-4 relative">
          
          {/* コンボ＆フィードバック表示 */}
          <div className="absolute top-4 w-full text-center h-12 flex flex-col items-center justify-center">
            {combo > 1 && !feedback && <div className="text-sm font-extrabold text-[#FF7A3D] animate-bounce">✨ {combo} コンボ！</div>}
            {feedback && (
              <div className={`text-base font-bold px-6 py-2 rounded-full shadow-lg ${feedback.type === "correct" ? "bg-[#FFD54F] text-[#5c4300] pop" : "bg-[#FF8A80] text-white shake"}`}>
                {feedback.message}
              </div>
            )}
          </div>

          <div className="flex flex-col items-center mt-8">
            <div className={`transition-transform duration-300 ${feedback?.type === "correct" ? "pop drop-shadow-xl" : "drop-shadow-md"}`}>
              {battle.enemy.Art({ size: battle.isBoss ? 160 : 120 })}
            </div>
            <div className="w-48 mt-4 bg-white/80 p-2 rounded-xl shadow-sm backdrop-blur">
              <div className="flex justify-between items-end mb-1">
                <span className="text-xs font-bold text-[#333844]">{battle.enemy.name}</span>
                <span className="text-[10px] text-[#64748B]">HP {battle.hp}/{battle.maxHp}</span>
              </div>
              <Bar value={battle.hp} max={battle.maxHp} color={ELEMENT_COLOR[battle.enemy.element] || "#FF7A3D"} />
            </div>
          </div>
        </div>

        {/* 問題＆入力エリア（キーボードに隠れないよう画面下部に固定） */}
        <div className="w-full bg-white rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.1)] z-20 flex flex-col">
          <div className="px-6 pt-5 pb-3">
            <div className="flex justify-between items-center mb-2">
              <span className="text-[10px] font-bold text-[#64748B] bg-gray-100 px-2 py-1 rounded-md">{currentArea.unit}</span>
              <span className="text-[10px] text-[#64748B]">あと {battle.questionsTarget - battle.questionsAnswered} 問</span>
            </div>
            
            <div className="text-lg font-bold text-[#1E293B] leading-relaxed min-h-[3rem] flex items-center">
              {problem.text}
            </div>

            {/* 入力ディスプレイ */}
            <div className={`mt-4 bg-[#F8FAFC] border-2 rounded-2xl p-4 flex items-center justify-center min-h-[4rem] transition-colors ${isError ? 'border-[#FF8A80] bg-[#FFF0F0] shake' : 'border-[#E2E8F0]'}`}>
              <span className={`text-3xl font-extrabold tracking-widest ${input ? 'text-[#1E293B]' : 'text-gray-300'}`}>
                {input || "答えを入力"}
              </span>
            </div>
            
            {showHint && (
              <div className="mt-3 bg-[#FFF8E1] border border-[#FFE082] rounded-xl p-3 text-sm text-[#8D6E63] font-medium pop">
                💡 {problem.hint}
              </div>
            )}
          </div>
          
          {/* カスタムナンバーパッド */}
          <Numpad onInput={handleInput} onDelete={handleDelete} onSubmit={submitAnswer} disabled={isProcessing} />
        </div>
      </div>
    );
  }

  function ResultScreen() {
    if (!resultInfo) return null;
    return (
      <div className="min-h-screen flex flex-col items-center justify-center bg-gradient-to-b from-[#F1F5F9] to-[#FFF] px-6">
        <div className="text-5xl mb-4 pop">{resultInfo.isBoss ? "🏆" : "🎉"}</div>
        <h2 className="text-2xl font-extrabold text-[#1E293B] mb-2">{resultInfo.isBoss ? "ボス討伐完了！" : "バトル勝利！"}</h2>
        <p className="text-sm text-[#64748B] mb-8">{currentArea?.name}をクリアしました</p>

        <div className="bg-white rounded-3xl shadow-xl p-6 w-full max-w-sm space-y-4">
          <div className="flex items-center justify-between font-bold text-[#333844] bg-[#F8FAFC] p-4 rounded-2xl">
            <span className="flex items-center gap-2">⚡ 経験値</span>
            <span className="text-lg text-[#3B82F6]">+{resultInfo.expGain}</span>
          </div>
          <div className="flex items-center justify-between font-bold text-[#333844] bg-[#F8FAFC] p-4 rounded-2xl">
            <span className="flex items-center gap-2">🪙 ゴールド</span>
            <span className="text-lg text-[#F59E0B]">+{resultInfo.goldGain}</span>
          </div>
          {resultInfo.caught && (
            <div className="mt-4 pt-4 border-t border-dashed border-gray-200">
              <div className="text-xs font-bold text-[#10B981] mb-2 text-center">新しい仲間をゲット！</div>
              <div className="flex items-center justify-center gap-3 bg-[#ECFDF5] p-3 rounded-2xl">
                {SPECIES[resultInfo.caught].Art({ size: 48 })}
                <span className="font-bold text-[#065F46]">{SPECIES[resultInfo.caught].name}</span>
              </div>
            </div>
          )}
        </div>

        <button onClick={() => setScreen("map")} className="mt-8 w-full max-w-xs py-4 rounded-2xl bg-[#1E293B] text-white font-extrabold shadow-lg active:scale-95 transition-transform">
          マップにもどる
        </button>
      </div>
    );
  }

  function CollectionScreen() {
    const all = Object.entries(SPECIES);
    return (
      <div className="min-h-screen bg-[#F8FAFC] pb-8">
        <TopBar player={player} />
        <div className="px-5 pt-6 pb-4 flex justify-between items-end">
          <div>
            <h1 className="text-2xl font-extrabold text-[#1E293B]">モンスター図鑑</h1>
            <p className="text-sm text-[#64748B] mt-1">収集率: {ownedSet.size} / {all.length}</p>
          </div>
          <button onClick={() => setScreen("map")} className="w-10 h-10 bg-white rounded-full shadow-sm flex items-center justify-center text-xl font-bold">×</button>
        </div>
        
        <div className="px-4 grid grid-cols-2 gap-4">
          {all.map(([id, sp]) => {
            const owned = ownedSet.has(id);
            return (
              <div key={id} className={`rounded-3xl p-4 flex flex-col items-center justify-center relative overflow-hidden ${owned ? "bg-white shadow-md" : "bg-gray-100/50 border border-gray-200"}`}>
                <div className={`transition-all duration-500 ${owned ? "scale-100 drop-shadow-md" : "scale-90 grayscale opacity-20"}`}>
                  {sp.Art({ size: 80 })}
                </div>
                <div className="text-sm font-bold text-[#1E293B] mt-3">{owned ? sp.name : "？？？"}</div>
                {owned && (
                  <div className="flex gap-1 mt-1">
                    {Array.from({ length: sp.rarity }).map((_, i) => <span key={i} className="text-[10px] text-yellow-400">★</span>)}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  return (
    <div className="font-sans w-full h-[100dvh] mx-auto relative bg-[#F8FAFC] shadow-2xl overflow-hidden sm:max-w-md sm:h-[850px] sm:rounded-[40px] sm:my-8 sm:border-8 sm:border-gray-900">
      {screen === "map" && <MapScreen />}
      {screen === "battle" && <BattleScreen />}
      {screen === "result" && <ResultScreen />}
      {screen === "collection" && <CollectionScreen />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<MathMonsterGame />);
</script>
</body>
</html>
